version: 2

project_name: xray

before:
  hooks:
    - go mod tidy

builds:
  # Build default — sem eBPF, roda em qualquer OS suportado.
  # Quando os collectors eBPF (#9-#14) entrarem, a release vai ganhar uma
  # segunda variante com -tags=ebpf só para linux/amd64 e linux/arm64.
  - id: xray
    main: ./cmd/xray
    binary: xray
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.buildDate={{ .Date }}

archives:
  - id: xray
    ids: [xray]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CLAUDE.md

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: "Features"
      regexp: "^.*feat[(\\w)]*:.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:.*$"
      order: 1
    - title: "Collectors"
      regexp: "^.*collector[(\\w)]*:.*$"
      order: 2
    - title: "TUI"
      regexp: "^.*tui[(\\w)]*:.*$"
      order: 3
    - title: "Infra"
      regexp: "^.*infra[(\\w)]*:.*$"
      order: 4
    - title: "Outros"
      order: 99

release:
  github:
    owner: trentas
    name: xray
  name_template: "xray {{ .Version }}"
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## xray {{ .Version }}

    Binários cross-compiled para Linux (amd64/arm64) e macOS (amd64/arm64).

    ### Verificação de integridade

    ```bash
    sha256sum -c SHA256SUMS
    ```

    ### Instalação

    ```bash
    curl -L https://github.com/trentas/xray/releases/download/{{ .Tag }}/xray-{{ .Version }}-linux-amd64.tar.gz | tar xz
    sudo install xray /usr/local/bin/
    xray --pid <PID> --no-ebpf
    ```
  footer: |
    ---

    Esta é uma release **sem eBPF embarcado** (modo `--no-ebpf` apenas).
    Coletores eBPF estão sendo entregues nas issues #9-#14.
