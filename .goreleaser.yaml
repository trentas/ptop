version: 2

project_name: xray

before:
  hooks:
    - go mod tidy

builds:
  # Default build — no eBPF, runs on any supported OS.
  # Once the eBPF collectors (#9-#14) land, the release will gain a
  # second variant with -tags=ebpf for linux/amd64 and linux/arm64 only.
  - id: xray
    main: ./cmd/xray
    binary: xray
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.buildDate={{ .Date }}

archives:
  - id: xray
    ids: [xray]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CLAUDE.md

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: "Features"
      regexp: "^.*feat[(\\w)]*:.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:.*$"
      order: 1
    - title: "Collectors"
      regexp: "^.*collector[(\\w)]*:.*$"
      order: 2
    - title: "TUI"
      regexp: "^.*tui[(\\w)]*:.*$"
      order: 3
    - title: "Infra"
      regexp: "^.*infra[(\\w)]*:.*$"
      order: 4
    - title: "Other"
      order: 99

release:
  github:
    owner: trentas
    name: xray
  name_template: "xray {{ .Version }}"
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## xray {{ .Version }}

    Cross-compiled binaries for Linux (amd64/arm64) and macOS (amd64/arm64).

    ### Integrity verification

    ```bash
    sha256sum -c SHA256SUMS
    ```

    ### Installation

    ```bash
    curl -L https://github.com/trentas/xray/releases/download/{{ .Tag }}/xray-{{ .Version }}-linux-amd64.tar.gz | tar xz
    sudo install xray /usr/local/bin/
    xray --pid <PID> --no-ebpf
    ```
  footer: |
    ---

    This release has **no embedded eBPF** (`--no-ebpf` mode only).
    eBPF collectors are being delivered in issues #9-#14.
