name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet · test · build (default + ebpf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # ─── Default lane (no eBPF) ───────────────────────────────────────────
      # Runs first because it exercises the path used by contributors without
      # libbpf-dev. A failure here breaks everyone without the eBPF toolchain.

      - name: go vet (default)
        run: go vet ./...

      - name: go test -race (default)
        run: go test -race -count=1 ./...

      - name: go build (default — TUI + /proc)
        run: go build -o /tmp/ptop ./cmd/ptop

      # ─── eBPF lane ────────────────────────────────────────────────────────
      # Requires libbpf headers + clang to compile the .bpf.c programs.
      # cilium/ebpf is pure-Go, so no libbpf.so is needed at runtime.

      - name: install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            libbpf-dev \
            linux-tools-common \
            linux-tools-generic

      - name: make gen (compile .bpf.c → .bpf.o)
        run: make gen

      - name: go vet (ebpf tag)
        run: go vet -tags=ebpf ./...

      - name: go test -race (ebpf tag)
        run: go test -race -count=1 -tags=ebpf ./...

      - name: go build (ebpf tag)
        run: go build -tags=ebpf -o /tmp/ptop-ebpf ./cmd/ptop

  proto:
    name: buf lint · format · generate · breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # buf breaking compares against the main branch ref

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # buf is pinned via `go run @version` (keep in sync with the Makefile's
      # BUF_VERSION). The codegen plugin is a pinned remote plugin, so no local
      # protoc-gen-go install is needed.
      - name: buf lint
        run: go run github.com/bufbuild/buf/cmd/buf@v1.70.0 lint

      - name: buf format check
        run: go run github.com/bufbuild/buf/cmd/buf@v1.70.0 format --diff --exit-code

      # The generated bindings are committed; fail if they drift from the .proto.
      - name: buf generate is up to date
        run: |
          go run github.com/bufbuild/buf/cmd/buf@v1.70.0 generate
          git diff --exit-code

      # Wire-compatibility gate: fail if the schema breaks consumers pinned to
      # the version on main. Skipped on push to main (it would compare against
      # itself); runs on PRs, where it matters. The PR checkout is a detached
      # HEAD with no local `main`, so fetch it first for buf to compare against.
      - name: buf breaking (vs main)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin main:main
          go run github.com/bufbuild/buf/cmd/buf@v1.70.0 breaking --against '.git#branch=main'
