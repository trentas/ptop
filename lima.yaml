# lima.yaml — Linux ARM64 development VM for testing xray with eBPF.
#
# Usage:
#   limactl start --name=xray-dev ./lima.yaml
#   limactl shell xray-dev
#   cd /Users/<you>/src/github.com/trentas/xray
#   make build-ebpf       # once the .bpf.c files land (issues #9-#14)
#   sudo ./bin/xray --pid 1
#
# Cleanup:
#   limactl stop xray-dev && limactl delete xray-dev

# Apple Virtualization Framework — near-native performance on Apple Silicon.
# On Intel Macs, switch to "qemu" (Lima also detects this automatically).
vmType: vz

# Ubuntu 24.04 LTS Server cloudimg arm64.
# Kernel 6.8 ships with BTF, ring buffer, CAP_BPF — everything we need.
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64

cpus: 4
memory: "4GiB"
disk: "20GiB"

# Share the Mac home with the VM. Edit on the Mac, run inside the VM.
# `writable: true` lets builds done inside the VM (bin/, *.o) show up on the Mac.
mounts:
  - location: "~"
    writable: true
mountType: virtiofs

# Provisioning: runs once on first start.
provision:
  - mode: system
    description: "Install Go + eBPF toolchain (clang, libbpf, bpftool)"
    script: |
      #!/bin/bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      # Ubuntu 22.04 doesn't have `bpftool` as a standalone package — it ships
      # inside linux-tools-$(uname -r). On 24.04 it exists, but using
      # linux-tools-* is compatible with both.
      apt-get install -y \
        build-essential \
        clang \
        llvm \
        libbpf-dev \
        linux-tools-common \
        linux-tools-generic \
        linux-tools-$(uname -r) \
        git \
        curl \
        ca-certificates \
        pkg-config

      # Go 1.22+ — Ubuntu 24.04's apt still ships 1.22 but at a weird path.
      # Downloading directly from go.dev is more deterministic.
      GOVER=1.22.10
      if ! command -v go >/dev/null 2>&1 || ! go version | grep -q "go1.2[2-9]"; then
        curl -sL "https://go.dev/dl/go${GOVER}.linux-arm64.tar.gz" | tar -C /usr/local -xz
        ln -sf /usr/local/go/bin/go /usr/local/bin/go
        ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt
      fi

  - mode: user
    description: "PATH + convenient variables for the default user (lima)"
    script: |
      #!/bin/bash
      set -eux
      grep -q 'GOPATH' ~/.bashrc 2>/dev/null || cat >>~/.bashrc <<'EOF'

      # xray dev env
      export GOPATH=$HOME/go
      export PATH=$PATH:/usr/local/go/bin:$GOPATH/bin
      EOF

# Probes: validate that setup finished. lima waits for all to pass before
# handing control back to the terminal.
probes:
  - description: "Go installed"
    script: |
      #!/bin/bash
      command -v go >/dev/null 2>&1
      go version | grep -q "go1.2[2-9]"
  - description: "libbpf-dev installed"
    script: |
      #!/bin/bash
      pkg-config --exists libbpf
  - description: "clang available"
    script: |
      #!/bin/bash
      command -v clang >/dev/null 2>&1

# When provisioning finishes, prints useful hints to the log (`limactl logs xray-dev`).
message: |
  ✓ VM xray-dev ready.

  Next steps:
    limactl shell xray-dev
    cd /Users/$(whoami)/src/github.com/trentas/xray   # adjust for your user
    make test                                          # runs the Linux tests
    make build-ebpf                                    # once .bpf.c lands (#9+)
    sudo ./bin/xray --pid 1 --no-ebpf                  # already works with the current MVP
