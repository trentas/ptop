syntax = "proto3";

package ptop.v1;

option go_package = "github.com/trentas/ptop/pkg/streampb;streampb";

// Category mirrors the F7 Timeline taxonomy. Every Event carries one so a
// consumer can filter without inspecting the payload oneof.
enum Category {
  CATEGORY_UNSPECIFIED = 0;
  CATEGORY_CPU = 1;
  CATEGORY_SYSCALL = 2;
  CATEGORY_NETWORK = 3;
  CATEGORY_MEMORY = 4;
  CATEGORY_THREAD = 5;
  CATEGORY_IO = 6;
  CATEGORY_FD = 7;
  CATEGORY_LOCK = 8;
  CATEGORY_TIMELINE = 9;
  CATEGORY_SIGNAL = 10; // #58 — signals delivered to the target
  CATEGORY_PROCESS = 11; // #60 — execution context + exec lineage
  CATEGORY_SECURITY = 12; // #59 — LSM decisions + runtime executable mappings
}

// StackRef references a stack captured at event time and resolved out-of-band
// (#54 — stack symbolization). stack_id is the kernel stack-map id; build_id is
// the target executable's GNU build-id, a stable per-process cache key (the
// same stack_id means a different stack once the binary changes). Consumers
// fetch the frames via EventStreamService.ResolveStack.
message StackRef {
  uint64 stack_id = 1;
  string build_id = 2;
}

// StackFrame is one symbolized frame of a captured stack (#54), leaf-first.
// func is "" when the address couldn't be resolved to a function (stripped
// non-Go module — module+offset still locate it); file/line are populated only
// for Go modules in this cut (C/C++ file:line needs DWARF). offset is
// module-relative, so it is comparable across runs/ASLR.
message StackFrame {
  string func = 1;
  string file = 2;
  int32 line = 3;
  string module = 4;
  uint64 offset = 5;
  string build_id = 6;
}

// Event is the single unified message on the stream. The envelope carries the
// common fields (time, pid/tid, category, optional stack); the category-
// specific data lives in the payload oneof. Snapshot-style payloads (lists)
// represent full current state, not deltas — the same semantics the in-process
// collector channels use today.
message Event {
  // Wall-clock capture time in Unix nanoseconds (from the collector's
  // time.Time). Per-payload timestamps collapse onto this envelope field.
  int64 ts_unix_nano = 1;
  int32 pid = 2;
  // tid is 0 when the event is not thread-scoped (most snapshots).
  int32 tid = 3;
  Category category = 4;
  // Optional; unset until #54.
  StackRef stack = 5;

  // Execution-context identity stamped on EVERY event (#60). uid/gid are the
  // target's real user/group; cgroup_id is the inode of its cgroup directory
  // (== bpf_get_current_cgroup_id() on cgroup v2). All three are 0 until the
  // first ProcContext snapshot has been observed, and on platforms without
  // /proc (macOS). The rich strings (cgroup path, container id, namespace
  // inodes) live in the periodic ProcContext payload, not on every envelope.
  uint32 uid = 6;
  uint32 gid = 7;
  uint64 cgroup_id = 8;

  oneof payload {
    CpuSample cpu = 10;
    SyscallSnapshot syscalls = 11;
    NetworkSnapshot network = 12;
    MemStats memory = 13;
    ThreadSnapshot threads = 14;
    IoWaitSample io_wait = 15;
    IoThroughputSample io_throughput = 16;
    IoSnapshot io = 17;
    FdSnapshot fds = 18;
    FdEvent fd_event = 19;
    LockSnapshot locks = 20;
    TimelineEvent timeline = 21;
    // #52 capabilities:
    HeapSnapshot heap = 22; // #53 — periodic heap aggregate
    HeapEvent heap_event = 23; // #53 — per alloc/free
    NetErrorEvent net_error = 24; // #56 — detailed network error
    FSEvent fs_event = 25; // #57 — filesystem semantics (denial/delete/rename)
    SignalEvent signal = 26; // #58 — signal delivered to the target, with origin
    TLSPayloadEvent tls = 27; // #55 — pre-encryption / post-decryption plaintext
    ProcContext proc_context = 28; // #60 — periodic namespace/cgroup/identity snapshot
    ProcLifecycleEvent proc_lifecycle = 29; // #60 — exec lineage (fork/exec/exit)
    SecurityEvent security = 30; // #59 — LSM decision / runtime executable mapping
  }
}

// ─── CPU ──────────────────────────────────────────────────────────────────
message CpuSample {
  double usage_pct = 1;
}

// ─── Syscalls ───────────────────────────────────────────────────────────────
message SyscallStat {
  string name = 1;
  uint64 count = 2;
  uint64 latency_ns = 3;
}
message SyscallSnapshot {
  repeated SyscallStat stats = 1;
}

// ─── Network ────────────────────────────────────────────────────────────────
message NetConn {
  int32 fd = 1;
  string type = 2; // "TCP" | "UDP" | "UNIX"
  string remote = 3;
  string state = 4; // "ESTABLISHED" | "WAIT" | "RECV" | "LISTEN"
  string dir = 5; // "→" | "←" | "↔"
  double latency_ms = 6;
  uint64 tx_bytes = 7;
  uint64 rx_bytes = 8;
}
message NetworkSnapshot {
  repeated NetConn conns = 1;
}

// NetErrorEvent is a kernel-observed network failure (#56), correlated to a
// connection by its peer 5-tuple. kind is "refused" (RST while still
// connecting), "reset" (RST mid-stream), or "retransmit" (a tcp_retransmit_skb
// fired). detail_ms is the latency from the relevant baseline to the RST
// (SYN_SENT→RST for refused, ESTABLISHED→RST for reset); 0 for retransmit.
// retransmits is the connection's running retransmit count at event time. The
// event timestamp lives on the Event envelope.
message NetErrorEvent {
  string kind = 1;
  string remote = 2; // peer host:port
  uint32 retransmits = 3;
  double detail_ms = 4;
}

// TLSPayloadEvent is plaintext observed around a TLS call (#55), captured via
// libssl uprobes before encryption (dir "write") or after decryption (dir
// "read"). fd is the owning socket (−1 if unknown); len is the call's plaintext
// byte count. data holds up to the configured cap of those bytes and is EMPTY
// unless --tls-bytes was set (metadata-only default). Category on the envelope
// is NETWORK; the event timestamp lives on the envelope.
//
// PRIVACY: data may contain credentials/PII. Capture is opt-in (--tls) and the
// payload bytes require the additional --tls-bytes flag. Consumers of the stream
// must treat data as sensitive.
message TLSPayloadEvent {
  string dir = 1; // "write" | "read"
  int32 fd = 2;
  int32 len = 3;
  bytes data = 4; // captured plaintext (≤ cap; empty in metadata-only mode)
}

// ─── Memory ─────────────────────────────────────────────────────────────────
message MemStats {
  uint64 rss_bytes = 1;
  uint64 heap_bytes = 2;
  uint64 page_faults = 3;
  uint64 allocs_per_s = 4;
}

// ─── Heap allocations (#53 — libc malloc/free pairing) ──────────────────────
// HeapEvent is a single allocation or free observed via libc uprobes. op is
// "malloc"|"calloc"|"realloc"|"free"; lifetime_ms is set on free; call_site is
// the application call-site address (resolved to a symbol out-of-band by #54).
message HeapEvent {
  string op = 1;
  uint64 size = 2;
  uint64 addr = 3;
  double lifetime_ms = 4;
  uint64 call_site = 5;
  bool large = 6; // allocation ≥ 128KB
}

// HeapCallSite aggregates the live allocations attributed to one application
// call site (by the alloc site, so a free decrements where it was allocated).
//
// call_site is the raw instruction pointer; func/file/line/module/offset are its
// symbolization (#54). func is "" when the address can't be resolved to a
// function (stripped non-Go module — module+offset still locate it); file/line
// are set only for Go modules in this cut (C/C++ file:line needs DWARF). addr_hex
// is the raw-address fallback ("0x…", or "unknown" when the stack walk failed).
message HeapCallSite {
  uint64 call_site = 1;
  string addr_hex = 2; // raw-address fallback ("0x…"; "unknown" when unresolved)
  uint64 live_bytes = 3;
  uint64 alloc_count = 4;
  double avg_lifetime_ms = 5;
  bool suspected = 6; // has live allocations older than the leak threshold
  string func = 7; // resolved function name ("" if unresolved)
  string file = 8; // source file (Go only in this cut; "" otherwise)
  int32 line = 9; // source line (0 if unknown)
  string module = 10; // backing module basename ("" if unresolved)
  uint64 offset = 11; // module-relative offset of the call site
  // Kernel stack-map id of the alloc site, for EventStreamService.ResolveStack
  // (the full leaf-first stack). A sentinel (resolves to not-found) when the
  // stack walk failed.
  uint64 stack_id = 12;
}

// HeapSnapshot is the periodic heap aggregate. live_heap_bytes and
// suspected_leak_bytes derive from the kernel's LRU-bounded live set, so they
// undercount on alloc-heavy targets — never exact. alloc_rate is allocations
// per second over the last window.
message HeapSnapshot {
  uint64 live_heap_bytes = 1;
  double alloc_rate = 2;
  uint64 suspected_leak_bytes = 3;
  repeated HeapCallSite top_call_sites = 4;
}

// ─── Threads ────────────────────────────────────────────────────────────────
message ThreadInfo {
  int32 tid = 1;
  string name = 2;
  string state = 3; // "running" | "blocked" | "sleeping"
  double cpu_pct = 4;
  string waiting = 5; // blocking lock/syscall name, empty if none
  uint64 ctx_switches = 6; // eBPF-only; 0 via /proc
}
message ThreadSnapshot {
  repeated ThreadInfo threads = 1;
}

// ─── I/O ──────────────────────────────────────────────────────────────────
message IoWaitSample {
  double pct = 1;
}
message IoThroughputSample {
  double read_bytes_per_s = 1;
  double write_bytes_per_s = 2;
  uint64 read_ops = 3; // cumulative since process start
  uint64 write_ops = 4; // cumulative
}
message IoFileStats {
  string path = 1;
  string type = 2; // "db" | "log" | "cfg" | "tmp" | "proc"
  uint64 reads = 3;
  uint64 writes = 4;
  uint64 bytes = 5;
  double latency_ms = 6;
  uint64 fsyncs = 7;
}
message LatencyBucket {
  string label = 1;
  double read = 2;
  double write = 3;
}
message IoSnapshot {
  double read_bytes_per_s = 1;
  double write_bytes_per_s = 2;
  uint64 read_ops = 3;
  uint64 write_ops = 4;
  uint64 fsyncs = 5;
  uint64 opens = 6;
  double io_wait_pct = 7;
  repeated IoFileStats top_files = 8;
  repeated LatencyBucket latency_buckets = 9;
}

// ─── Filesystem semantics (#57) ─────────────────────────────────────────────
// FSEvent is a kernel-observed filesystem semantic event: a permission denial on
// open/openat (op="denied", err EACCES/EPERM), a delete (op="deleted"), or a
// rename (op="renamed"). new_path is the rename destination ("" otherwise);
// errno/err carry the syscall result (0/"" on success — deletes and renames are
// emitted on success too, denials only on failure). Category on the envelope is
// IO; the event timestamp lives on the envelope.
message FSEvent {
  string op = 1; // "denied" | "deleted" | "renamed"
  string path = 2;
  string new_path = 3; // rename destination; "" otherwise
  int32 errno = 4; // 0 on success; positive errno (EACCES=13, …)
  string err = 5; // "EACCES" | "EPERM" | "ENOENT" | "" …
}

// ─── Signals (#58) ──────────────────────────────────────────────────────────
// SignalEvent is a signal delivered to the target, captured at kernel generation
// time — including who sent it. signal is the symbolic name ("SIGPIPE");
// sender_pid/sender_comm identify the sending process (for kernel-generated
// signals like SIGSEGV the sender is the target itself); target_tid is the
// receiving thread. code is si_code (SI_USER/SI_KERNEL/…) — a root-cause hint;
// result is the kernel TRACE_SIGNAL_* disposition. Category on the envelope is
// SIGNAL; the event timestamp lives on the envelope.
message SignalEvent {
  string signal = 1; // "SIGPIPE", "SIGTERM", … (or "SIG<n>")
  int32 signo = 2;
  int32 sender_pid = 3;
  string sender_comm = 4;
  int32 target_tid = 5;
  int32 code = 6; // si_code
  int32 result = 7; // TRACE_SIGNAL_* disposition
}

// ─── Execution context (#60) ────────────────────────────────────────────────
// ProcContext is the target's container/execution context, read from /proc and
// emitted periodically (and once at start). uid/gid are the real user/group;
// the *_ns fields are the inode numbers of the target's namespaces (from
// /proc/<pid>/ns/*) — equal across processes in the same namespace, so they
// identify container/sandbox membership. cgroup_id is the inode of the cgroup
// directory (matches bpf_get_current_cgroup_id() on cgroup v2); cgroup is its
// path. container is a best-effort id derived from the cgroup path
// ("docker:<12hex>", "containerd:…", "kubepods:…", "libpod:…", "lxc:…"), or ""
// when the target isn't in a recognized container. Category on the envelope is
// PROCESS; the snapshot time lives on the envelope. This payload is Linux-only
// (namespaces/cgroups don't exist on macOS).
message ProcContext {
  uint32 uid = 1;
  uint32 gid = 2;
  uint64 pid_ns = 3;
  uint64 net_ns = 4;
  uint64 mnt_ns = 5;
  uint64 user_ns = 6;
  uint64 cgroup_ns = 7;
  uint64 ipc_ns = 8;
  uint64 uts_ns = 9;
  uint64 cgroup_id = 10;
  string cgroup = 11; // cgroup path (v2 "0::/p" → "/p")
  string container = 12; // derived container id; "" if none
}

// ProcLifecycleEvent is an exec-lineage event (#60) reconstructing the process
// tree the target spawns: a fork/clone (kind="fork"), an execve (kind="exec"),
// or a process exit (kind="exit"). pid is the subject (the child for fork, the
// task itself for exec/exit), ppid is the parent (set for fork; 0 otherwise).
// comm is the subject's command name; filename is the executed path (exec only,
// "" otherwise). The eBPF collector seeds a tracked set with the target and
// grows it on each fork, so the whole descendant subtree is captured. Category
// on the envelope is PROCESS; the event time lives on the envelope. eBPF-only —
// never simulated.
message ProcLifecycleEvent {
  string kind = 1; // "fork" | "exec" | "exit"
  int32 pid = 2; // subject pid (child for fork, self for exec/exit)
  int32 ppid = 3; // parent pid (fork only; 0 otherwise)
  string comm = 4; // subject command name
  string filename = 5; // executed path (exec only; "" otherwise)
}

// ─── Security (#59) ──────────────────────────────────────────────────────────
// SecurityEvent surfaces a kernel security-relevant action on the target. kind
// is "exec-map" (a runtime mmap/mprotect that set PROT_EXEC — code mapped
// executable after start: dlopen, JIT, or RWX injection) or "lsm-decision" (a
// kernel LSM denial, best-effort via the SELinux AVC tracepoint; absent where
// the hook isn't exposed).
//
// For exec-map: op is "mmap"|"mprotect"; addr/len/prot describe the mapping
// (prot is the PROT_* bitmask); write_exec flags simultaneous write+exec (W^X),
// anon flags a non-file-backed mapping (mmap only) — the two higher-signal
// cases. call_site is the symbolized originating application frame (#54; func ""
// and offset = raw address when unresolved). For lsm-decision: detail carries
// the human summary (denied perms, class, contexts) and the mmap fields are 0.
// Category on the envelope is SECURITY; the event time lives on the envelope.
// eBPF-only — never simulated.
message SecurityEvent {
  string kind = 1; // "exec-map" | "lsm-decision"
  string op = 2; // "mmap" | "mprotect" (exec-map); "" for lsm
  uint64 addr = 3;
  uint64 len = 4;
  uint32 prot = 5; // PROT_* bitmask (exec-map)
  bool write_exec = 6; // PROT_WRITE & PROT_EXEC (W^X)
  bool anon = 7; // non-file-backed mapping (mmap only)
  string detail = 8; // lsm summary, or extra exec-map context
  StackFrame call_site = 9; // exec-map originating frame (symbolized, #54)
}

// ─── File descriptors ───────────────────────────────────────────────────────
message FdEntry {
  int32 fd = 1;
  string type = 2; // "file" | "socket" | "pipe" | "epoll" | "timer" | "event"
  string desc = 3; // full path or remote address
  string flags = 4; // "O_RDONLY" | "O_WRONLY" | "O_RDWR"
  uint64 bytes = 5;
  int64 age_ms = 6;
  bool active = 7; // had activity in the last cycle
}
message FdSnapshot {
  repeated FdEntry fds = 1;
}

// FdEvent is a change notification (openat/close/dup2/...); its timestamp is on
// the Event envelope.
message FdEvent {
  string message = 1;
}

// ─── Locks (futex) ──────────────────────────────────────────────────────────
message LockEntry {
  uint64 uaddr = 1; // futex word virtual address (no symbols → shown in hex)
  uint64 waiters = 2; // cumulative wait_count
  uint64 wakers = 3; // cumulative wake_count
  uint64 wait_delta = 4; // new waits in the current window
  double latency_ms = 5; // average per call
  int32 last_wait_tid = 6;
  int32 last_wake_tid = 7;
}
message LockSnapshot {
  repeated LockEntry locks = 1;
}

// ─── Timeline ───────────────────────────────────────────────────────────────
// TimelineEvent's category and timestamp live on the Event envelope.
message TimelineEvent {
  string message = 1;
}
